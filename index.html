<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disposition – Wochenplanung</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Disposition Wochenplanung</h1>
        <p>Wochenansicht für Bautrupps mit automatischer Datumslogik</p>
      </div>
      <div class="topbar-badge">
        Wochentag + Datum im Kopf, darunter beginnt direkt das Auftragspensum
      </div>
    </header>

    <section class="controls-card">
      <div class="controls-grid">
        <div class="field-group">
          <label for="teamSelect">Bautrupp</label>
          <select id="teamSelect"></select>
        </div>

        <div class="field-group">
          <label for="weekSelect">Kalenderwoche</label>
          <select id="weekSelect"></select>
        </div>

        <div class="field-group">
          <label for="yearSelect">Jahr</label>
          <select id="yearSelect"></select>
        </div>

        <div class="field-group">
          <label>Aktive Auswahl</label>
          <div class="selection-box" id="selectionBox">-</div>
        </div>
      </div>

      <div class="actions">
        <button id="prevWeekBtn" class="btn btn-secondary">Vorige KW</button>
        <button id="nextWeekBtn" class="btn btn-secondary">Nächste KW</button>
        <button id="currentWeekBtn" class="btn btn-secondary">Heute</button>
        <button id="newOrderBtn" class="btn btn-primary">Neuer Auftrag</button>
        <button id="pdfBtn" class="btn btn-secondary">PDF-Export</button>
      </div>
    </section>

    <main class="week-grid" id="weekGrid"></main>
  </div>

  <div class="modal hidden" id="orderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Neuer Auftrag</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>

      <form id="orderForm" class="order-form">
        <div class="form-grid">
          <div class="field-group">
            <label for="orderTitle">Kurztext / Titel</label>
            <input type="text" id="orderTitle" required />
          </div>

          <div class="field-group">
            <label for="orderAddress">Adresse</label>
            <input type="text" id="orderAddress" required />
          </div>

          <div class="field-group">
            <label for="orderTeam">Bautrupp</label>
            <select id="orderTeam" required></select>
          </div>

          <div class="field-group">
            <label for="orderDate">Datum</label>
            <input type="date" id="orderDate" required />
          </div>

          <div class="field-group">
            <label for="orderCrew">Kolonne</label>
            <input type="text" id="orderCrew" placeholder="z. B. Kolonne A" />
          </div>

          <div class="field-group">
            <label for="orderQuantity">Pensum</label>
            <input type="text" id="orderQuantity" placeholder="z. B. 2 MA / 1 Tag" />
          </div>

          <div class="field-group">
            <label for="orderKlsId">KLS-ID</label>
            <input type="text" id="orderKlsId" />
          </div>

          <div class="field-group">
            <label for="orderVaoStatus">VAO-Status</label>
            <select id="orderVaoStatus">
              <option value="">Bitte wählen</option>
              <option value="gestellt">gestellt</option>
              <option value="nicht_gestellt">nicht gestellt</option>
              <option value="da">da</option>
              <option value="nicht_noetig">nicht nötig</option>
            </select>
          </div>

          <div class="field-group full-width">
            <label for="orderDetails">Details</label>
            <textarea id="orderDetails" rows="4"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Abbrechen</button>
          <button type="submit" class="btn btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
